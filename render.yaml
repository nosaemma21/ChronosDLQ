services:
  - type: web
    name: chronosdlq-api
    runtime: docker
    plan: free
    autoDeployTrigger: commit
    dockerfilePath: ./ChronosDLQ.App/Dockerfile
    dockerContext: .
    healthCheckPath: /api/health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: ASPNETCORE_URLS
        value: http://+:10000
      - key: ASPNETCORE_FORWARDEDHEADERS_ENABLED
        value: "true"
      - key: ConnectionStrings__ChronosDb
        fromDatabase:
          name: chronosdlq-db
          property: connectionString
      - key: Cors__AllowedOrigins__0
        value: https://chronosdlq-ui.onrender.com
      - key: Chronos__ApiKey
        sync: false
      - key: Chronos__OperatorKey
        sync: false
      - key: RabbitMq__ConnectionUrl
        sync: false

  - type: web
    name: chronosdlq-ui
    runtime: static
    autoDeployTrigger: commit
    rootDir: ChronosDLQ.UI
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_CHRONOS_API_BASE_URL
        value: https://chronosdlq-api.onrender.com/api
      - key: VITE_CHRONOS_API_KEY
        sync: false
      - key: VITE_CHRONOS_OPERATOR_KEY
        sync: false
      - key: VITE_CHRONOS_ACTOR
        value: render-operator

databases:
  - name: chronosdlq-db
    databaseName: chronos_dlq
    user: chronos
    plan: free
    postgresMajorVersion: "16"
